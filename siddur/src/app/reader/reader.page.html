<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>{{ preset?.titleHe }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="reader-content">
  <div class="reader-layout" *ngIf="preset">
    <ion-card *ngIf="!isPdfAvailable || loadErrorMessage" color="warning">
      <ion-card-header>
        <ion-card-title>{{ loadErrorMessage ? 'שגיאה בטעינת ה-PDF' : 'חסר קובץ PDF' }}</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ng-container *ngIf="loadErrorMessage; else missingPdfMessage">
          {{ loadErrorMessage }}
        </ng-container>
        <ng-template #missingPdfMessage>
          קובץ הסידור עדיין לא זמין באפליקציה.
        </ng-template>
      </ion-card-content>
    </ion-card>

    <section #stageRef class="reader-stage" *ngIf="isPdfAvailable && !loadErrorMessage">
      <div class="page-loading" *ngIf="isPdfLoading">
        <ion-spinner name="crescent"></ion-spinner>
      </div>

      <swiper-container
        #swiperRef
        class="reader-swiper"
        [attr.initial-slide]="activeSlideIndex"
        (swiperslidechange)="onSwiperSlideChange()"
      >
        <swiper-slide *ngFor="let pageNumber of visiblePages; trackBy: trackByPage">
          <div class="page-slide-shell">
            <ng-container *ngIf="getRenderedPage(pageNumber) as renderedPage; else pendingPage">
              <img
                class="pdf-page-image"
                [src]="renderedPage.src"
                [width]="renderedPage.width"
                [height]="renderedPage.height"
                alt=""
                draggable="false"
              />
            </ng-container>
            <ng-template #pendingPage>
              <div class="page-placeholder"></div>
            </ng-template>
          </div>
        </swiper-slide>
      </swiper-container>
    </section>
  </div>
</ion-content>
